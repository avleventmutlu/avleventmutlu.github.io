<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Makale | Av. Levent Mutlu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bordo: #6B1A1A; --bordo-koyu: #4A1010; --bordo-acik: #8B2A2A;
      --krem: #F5EFE0; --krem-koyu: #E8DCC8;
      --altin: #B8943F; --altin-acik: #D4AF60;
      --metin: #2C1810; --metin-acik: #5C3D2E; --beyaz: #FDFAF5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--beyaz); color: var(--metin); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bordo-koyu); border-bottom: 1px solid var(--altin);
      padding: 0 5%; display: flex; align-items: center;
      justify-content: space-between; height: 68px;
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 500; color: var(--krem); letter-spacing: 0.08em; text-decoration: none; }
    .nav-logo span { color: var(--altin-acik); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--krem-koyu); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--altin-acik); }

    .makale-hero {
      padding: 10rem 5% 5rem;
      background: var(--bordo-koyu);
      max-width: 100%;
    }
    .makale-hero-inner { max-width: 760px; margin: 0 auto; }
    .geri-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--altin);
      text-decoration: none; margin-bottom: 2rem;
      transition: gap 0.3s;
    }
    .geri-link:hover { gap: 0.8rem; }
    .makale-kategori-tag {
      display: inline-block;
      font-size: 0.62rem; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--altin);
      border: 1px solid var(--altin); padding: 0.3rem 0.8rem;
      margin-bottom: 1.5rem;
    }
    .makale-baslik-buyuk {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 400;
      color: var(--krem); line-height: 1.2; margin-bottom: 1.5rem;
    }
    .makale-meta {
      font-size: 0.72rem; color: rgba(245,239,224,0.4);
      letter-spacing: 0.1em;
    }

    .makale-govde {
      max-width: 760px; margin: 0 auto;
      padding: 5rem 5%;
    }
    .makale-govde .ozet {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-style: italic; font-weight: 300;
      color: var(--bordo-acik); line-height: 1.7;
      border-left: 3px solid var(--altin);
      padding-left: 1.5rem; margin-bottom: 3rem;
    }
    .makale-govde .icerik {
      font-size: 0.95rem; font-weight: 300;
      line-height: 2; color: var(--metin-acik);
    }
    .makale-govde .icerik p { margin-bottom: 1.5rem; }

    .iletisim-kutu {
      margin-top: 4rem; padding: 3rem;
      background: var(--krem); border-left: 4px solid var(--bordo);
      text-align: center;
    }
    .iletisim-kutu p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-style: italic;
      color: var(--bordo-koyu); margin-bottom: 1.5rem;
    }
    .iletisim-kutu a {
      display: inline-block; padding: 0.9rem 2.5rem;
      background: var(--bordo); color: var(--krem);
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      text-decoration: none; transition: background 0.3s;
    }
    .iletisim-kutu a:hover { background: var(--bordo-acik); }

    footer {
      background: var(--bordo-koyu); border-top: 1px solid rgba(184,148,63,0.2);
      padding: 2rem 5%; display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: rgba(245,239,224,0.5); }
    .footer-hukuk { font-size: 0.65rem; color: rgba(245,239,224,0.3); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Av. <span>Levent Mutlu</span></a>
    <ul class="nav-links">
      <li><a href="index.html#hakkimda">Hakkımda</a></li>
      <li><a href="index.html#uzmanlik">Uzmanlık</a></li>
      <li><a href="makaleler.html">Makaleler</a></li>
      <li><a href="index.html#iletisim">İletişim</a></li>
    </ul>
  </nav>

  <div class="makale-hero">
    <div class="makale-hero-inner">
      <a href="makaleler.html" class="geri-link">← Tüm Makaleler</a>
      <div id="hero-icerik">
        <p style="color:rgba(245,239,224,0.4); font-style:italic;">Yükleniyor...</p>
      </div>
    </div>
  </div>

  <div class="makale-govde" id="makale-govde"></div>

  <footer>
    <div class="footer-logo">Av. Levent Mutlu</div>
    <div class="footer-hukuk">© 2026 · Tüm hakları saklıdır · İstanbul</div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function yukle() {
      try {
        const res = await fetch('makaleler.json?t=' + Date.now());
        const makaleler = await res.json();
        const m = makaleler.find(x => x.id === id);
        if (!m) {
          document.getElementById('hero-icerik').innerHTML = '<p style="color:var(--krem)">Makale bulunamadı.</p>';
          return;
        }
        document.title = m.baslik + ' | Av. Levent Mutlu';
        document.getElementById('hero-icerik').innerHTML = `
          <div class="makale-kategori-tag">${m.kategori}</div>
          <h1 class="makale-baslik-buyuk">${m.baslik}</h1>
          <p class="makale-meta">${m.tarih}</p>
        `;
        const paragraflar = m.icerik.split('\n\n').map(p => `<p>${p}</p>`).join('');
        document.getElementById('makale-govde').innerHTML = `
          <div class="ozet">${m.ozet}</div>
          <div class="icerik">${paragraflar}</div>
          <div class="iletisim-kutu">
            <p>Bu konuda hukuki danışmanlık almak ister misiniz?</p>
            <a href="tel:+905459594845">📞 Randevu Alın</a>
          </div>
        `;
      } catch(e) {
        document.getElementById('hero-icerik').innerHTML = '<p style="color:var(--krem)">Makale yüklenemedi.</p>';
      }
    }
    yukle();
  </script>
</body>
</html>
