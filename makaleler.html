      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobil-menu" id="mobilMenu">
    <a href="index.html#hakkimda" onclick="menuKapat()">Hakkımda</a>
    <a href="index.html#uzmanlik" onclick="menuKapat()">Uzmanlık</a>
    <a href="makaleler.html" class="aktif" onclick="menuKapat()">Makaleler</a>
    <a href="index.html#iletisim" onclick="menuKapat()">İletişim</a>
  </div>

  <div class="sayfa-baslik">
    <p>Hukuki Perspektifler</p>
    <h1>Hukuk <em>Makaleleri</em></h1>
  </div>

  <div class="filtre-bar">
    <button class="filtre-btn aktif" onclick="filtrele('tumu', this)">Tümü</button>
    <button class="filtre-btn" onclick="filtrele('Ceza Hukuku', this)">Ceza Hukuku</button>
    <button class="filtre-btn" onclick="filtrele('Aile Hukuku', this)">Aile Hukuku</button>
    <button class="filtre-btn" onclick="filtrele('İş Hukuku', this)">İş Hukuku</button>
    <div class="arama-kutu">
      <input class="arama-input" id="aramaInput" type="text" placeholder="Makale ara..." oninput="aramaYap(this.value)">
      <span class="arama-ikon">🔍</span>
    </div>
  </div>

  <div class="makaleler-listesi">
    <div class="yukluyor">Yükleniyor...</div>
  </div>

  <footer>
    <div class="footer-logo">Av. Levent Mutlu</div>
    <div class="footer-hukuk">© 2026 · Tüm hakları saklıdır · İstanbul</div>
  </footer>

  <script>
    let tumMakaleler = [];

    function menuAc() {
      document.getElementById('mobilMenu').classList.toggle('acik');
    }
    function menuKapat() {
      document.getElementById('mobilMenu').classList.remove('acik');
    }

    async function makaleleriYukle() {
      try {
        const res = await fetch('makaleler.json?t=' + Date.now());
        tumMakaleler = await res.json();
        // URL'den arama parametresi varsa uygula
        var urlParams = new URLSearchParams(window.location.search);
        var araParam = urlParams.get('ara');
        if (araParam) {
          document.getElementById('aramaInput').value = araParam;
          aramaYap(araParam);
        } else {
          goster(tumMakaleler);
        }
      } catch(e) {
        document.querySelector('.makaleler-listesi').innerHTML = '<p class="bos-mesaj">Makaleler yüklenemedi.</p>';
      }
    }

    function goster(makaleler) {
      const liste = document.querySelector('.makaleler-listesi');
      if (!makaleler.length) {
        liste.innerHTML = '<p class="bos-mesaj">Bu kategoride henüz makale bulunmuyor.</p>';
        return;
      }
      liste.innerHTML = makaleler.map(m => `
        <div class="makale-kart" onclick="window.location='makale.html?id=${m.id}'">
          <div class="makale-tarih-col">${m.tarih}</div>
          <div class="makale-icerik">
            <span class="makale-kategori">${m.kategori}</span>
            <a class="makale-baslik" href="makale.html?id=${m.id}">${m.baslik}</a>
            <p class="makale-ozet">${m.ozet}</p>
            <a class="makale-devam" href="makale.html?id=${m.id}">Devamını Oku →</a>
          </div>
        </div>
      `).join('');
    }

    function filtrele(kategori, btn) {
      document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
      btn.classList.add('aktif');
      if (kategori === 'tumu') goster(tumMakaleler);
      else goster(tumMakaleler.filter(m => m.kategori === kategori));
    }

    makaleleriYukle();
  </script>


<script>

      {k:["nafaka","tedbir nafakasi","istirak nafakasi","yoksulluk nafakasi"],c:"Nafaka türleri şunlardır: tedbir nafakası (dava süresince), iştirak nafakası (çocuk için) ve yoksulluk nafakası (eş için). Nafaka miktarı tarafların ekonomik durumuna göre belirlenir ve artırım davası açılabilir.",r:true},
      {k:["kidem","ihbar","kidem tazminati","ihbar tazminati","isine son"],c:"Kıdem tazminatı her tam yıl için 30 günlük brüt ücret üzerinden hesaplanır. İhbar tazminatı ise çalışma süresine göre 2-8 hafta arasında değişir. Hesaplama hataları çok yaygındır, mutlaka kontrol ettirilmelidir.",r:true},
      {k:["is guvencesi","gecersiz fesih","ise iade","ise iade davasi"],c:"1 yılı aşkın kıdemi olan ve 30'dan fazla işçi çalıştıran işyerlerinde geçersiz feshe karşı işe iade davası açılabilir. Bu dava fesih bildiriminden itibaren 1 ay içinde açılmalıdır. Süre kaçırılırsa hak tamamen düşer.",r:true},
      {k:["tenkis","tenkis davasi","sakli pay","miras hakki"],c:"Tenkis davası, mirasçıların saklı paylarının ihlal edildiği durumlarda açılır. Saklı pay oranları mirasçı türüne göre değişir. Bu dava miras bırakanın ölümünden itibaren belirli süreler içinde açılmalıdır.",r:true},
      {k:["miras reddi","mirasi reddet","mirasi red"],c:"Mirasçılar, ölüm tarihinden itibaren 3 ay içinde mirası reddedebilir. Özellikle borçlu tereke söz konusu olduğunda ret kararı büyük önem taşır. Ret beyanı noter aracılığıyla veya mahkemeye yapılır.",r:true},
      {k:["dava acma suresi","zamanasimt","hak dusurucü","sure"],c:"Hukuki davalarda süreler son derece kritiktir. Zamanaşımı ve hak düşürücü süreler dava türüne göre 1 ay ile 10 yıl arasında değişir. Süre geçirildikten sonra dava açma hakkı tamamen kaybedilebilir.",r:true},
      {k:["icra","icra takibi","haciz","borcum var","alacakli"],c:"İcra takibi, borcun ödenmemesi durumunda alacaklının başvurabileceği hukuki yoldur. İtiraz süresi ödeme emrinin tebliğinden itibaren 7 veya 15 gündür. Bu süre geçirilirse borç kesinleşir ve haciz işlemleri başlar.",r:true},

      {k:["sigorta","sgk","is kazasi","meslek hastaligi"],c:"İş kazası bildiriminin SGK'ya yapılması zorunludur. İş kazasından doğan tazminat haklarının kullanılması için delillerin hızla toplanması şarttır. Gecikme durumunda önemli haklar yitirilebilir.",r:true},
      {k:["cocuk istismar","aile ici siddet","siddet","darp","kavga"],c:"Aile içi şiddet ve çocuk istismarı durumlarında öncelikle güvenliğinizi sağlayın. Koruma kararı ve uzaklaştırma kararı için acilen hukuki destek almanızı öneririz. Büromuz bu tür acil davalara öncelik vermektedir.",r:true},
      {k:["tck","tck158","banka hesabi","banka hesap","hesap kullan","5549","hesabini kullan","para transfer","suistimal","dolandirici","dolandiricilik","sahte","hesap verdi","hesabimi verdi"],c:"Banka hesabini baskasina kullandirmak 5549 sayili Kanun m.15 kapsaminda suc teskil etmektedir. Bildirim yukumlulugunu yerine getirmeden baskasi hesabina islem yapanlar 6 aydan 1 yila kadar hapis veya adli para cezasiyla karsilasabilir. Bu suclama son derece teknik ve nüanslı olup savunma stratejisi hayati onem tasir. Deneyimli bir avukat olmadan bu davada hak kaybı yasanmasi kacınılmazdir.",r:true},
      {k:["bosanma","boşanma","evlilik","anlasmali","cekismeli","nafaka","velayet"],c:"Bosanma davasi turune gore 1-3 ay (anlasmali) veya 1-3 yil (cekismeli) surebilir. Velayet, nafaka ve mal paylasimi konularinda da destek sunuyoruz.",r:true},

    function cevapBul(s){
      s=s.toLowerCase();
      for(var i=0;i<db.length;i++){
        for(var j=0;j<db[i].k.length;j++){
          if(s.indexOf(db[i].k[j])>-1) return db[i];

  <script>
    function aramaYap(kelime) {
      if (!kelime.trim()) {
        goster(tumMakaleler);
        return;
      }
      var k = kelime.toLowerCase();
      var sonuc = tumMakaleler.filter(function(m) {
        return m.baslik.toLowerCase().includes(k) ||
               m.ozet.toLowerCase().includes(k) ||
               m.kategori.toLowerCase().includes(k) ||
               m.icerik.toLowerCase().includes(k);
      });
      goster(sonuc);
    }
  </script>
