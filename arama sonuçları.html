<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arama Sonuçları | Av. Levent Mutlu</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bordo: #6B1A1A; --bordo-koyu: #4A1010; --bordo-acik: #8B2A2A;
      --krem: #F5EFE0; --krem-koyu: #E8DCC8;
      --altin: #B8943F; --altin-acik: #D4AF60;
      --metin: #2C1810; --metin-acik: #5C3D2E; --beyaz: #FDFAF5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: var(--beyaz); color: var(--metin); }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bordo-koyu); border-bottom: 1px solid var(--altin);
      padding: 0 5%; display: flex; align-items: center;
      justify-content: space-between; height: 68px;
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 500; color: var(--krem); letter-spacing: 0.08em; text-decoration: none; }
    .nav-logo span { color: var(--altin-acik); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--krem-koyu); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--altin-acik); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 5px; background: none; border: none; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--krem); }
    .mobil-menu { display: none; position: fixed; top: 68px; left: 0; right: 0; background: var(--bordo-koyu); border-bottom: 1px solid var(--altin); z-index: 99; padding: 0.5rem 5%; flex-direction: column; }
    .mobil-menu.acik { display: flex; }
    .mobil-menu a { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--krem-koyu); text-decoration: none; padding: 1rem 0; border-bottom: 1px solid rgba(184,148,63,0.15); transition: color 0.3s; }
    .mobil-menu a:last-child { border-bottom: none; }
    .mobil-menu a:hover { color: var(--altin-acik); }

    .arama-baslik {
      padding: 10rem 5% 3rem; background: var(--bordo-koyu);
    }
    .arama-baslik p { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--altin); margin-bottom: 0.8rem; }
    .arama-baslik h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; color: var(--krem); margin-bottom: 1.5rem; }
    .arama-baslik h1 span { color: var(--altin-acik); font-style: italic; }

    .yeni-arama {
      display: flex; align-items: center;
      max-width: 500px;
      border: 1px solid rgba(184,148,63,0.5);
      background: rgba(255,255,255,0.05);
    }
    .yeni-arama input {
      flex: 1; background: transparent; border: none;
      padding: 0.8rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem; color: var(--krem); outline: none;
    }
    .yeni-arama input::placeholder { color: rgba(245,239,224,0.35); }
    .yeni-arama button {
      background: var(--altin); border: none;
      padding: 0.8rem 1.2rem; color: var(--bordo-koyu);
      font-size: 1rem; cursor: pointer;
    }

    .sonuclar-alani { max-width: 860px; margin: 0 auto; padding: 3rem 5%; }

    .sonuc-grup { margin-bottom: 3rem; }
    .sonuc-grup-baslik {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--bordo);
      border-bottom: 2px solid var(--bordo);
      padding-bottom: 0.5rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sonuc-sayi {
      background: var(--bordo); color: var(--krem);
      font-size: 0.6rem; padding: 0.2rem 0.6rem; border-radius: 10px;
    }

    .sonuc-kart {
      display: grid; grid-template-columns: auto 1fr;
      gap: 1.5rem; padding: 1.5rem 0;
      border-bottom: 1px solid var(--krem-koyu);
      transition: all 0.3s; cursor: pointer;
    }
    .sonuc-kart:hover { transform: translateX(8px); }
    .sonuc-tip {
      writing-mode: vertical-rl;
      font-size: 0.55rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--altin); padding-top: 0.2rem;
    }
    .sonuc-baslik {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 500;
      color: var(--bordo-koyu); line-height: 1.3;
      margin-bottom: 0.4rem; transition: color 0.3s;
    }
    .sonuc-kart:hover .sonuc-baslik { color: var(--bordo-acik); }
    .sonuc-ozet { font-size: 0.78rem; font-weight: 300; color: var(--metin-acik); line-height: 1.7; margin-bottom: 0.3rem; }
    .sonuc-kategori { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bordo-acik); }

    .bos-sonuc { text-align: center; padding: 4rem; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: var(--metin-acik); }

    .yukleniyor { text-align: center; padding: 3rem; font-style: italic; color: var(--metin-acik); }

    footer { background: var(--bordo-koyu); border-top: 1px solid rgba(184,148,63,0.2); padding: 2rem 5%; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: rgba(245,239,224,0.5); }
    .footer-hukuk { font-size: 0.65rem; color: rgba(245,239,224,0.3); }

    .whatsapp-btn { position: fixed; bottom: 28px; right: 28px; width: 58px; height: 58px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 999; text-decoration: none; font-size: 28px; transition: transform 0.3s; }
    .whatsapp-btn:hover { transform: scale(1.1); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Av. <span>Levent Mutlu</span></a>
    <ul class="nav-links">
      <li><a href="index.html#hakkimda">Hakkımda</a></li>
      <li><a href="index.html#uzmanlik">Uzmanlık</a></li>
      <li><a href="makaleler.html">Makaleler</a></li>
      <li><a href="dilekce.html">Dilekçeler</a></li>
      <li><a href="haberler.html">Haberler</a></li>
      <li><a href="index.html#iletisim">İletişim</a></li>
    </ul>
    <button class="hamburger" onclick="menuAc()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobil-menu" id="mobilMenu">
    <a href="index.html#hakkimda" onclick="menuKapat()">Hakkımda</a>
    <a href="index.html#uzmanlik" onclick="menuKapat()">Uzmanlık</a>
    <a href="makaleler.html" onclick="menuKapat()">Makaleler</a>
    <a href="dilekce.html" onclick="menuKapat()">Dilekçeler</a>
    <a href="haberler.html" onclick="menuKapat()">Haberler</a>
    <a href="index.html#iletisim" onclick="menuKapat()">İletişim</a>
  </div>

  <div class="arama-baslik">
    <p>Arama Sonuçları</p>
    <h1 id="aramaBaslik">Aranıyor...</h1>
    <div class="yeni-arama">
      <input type="text" id="yeniArama" placeholder="Yeni arama yapın...">
      <button onclick="yeniAramaYap()">🔍</button>
    </div>
  </div>

  <div class="sonuclar-alani" id="sonuclarAlani">
    <div class="yukleniyor">Aranıyor...</div>
  </div>

  <footer>
    <div class="footer-logo">Av. Levent Mutlu</div>
    <div class="footer-hukuk">© 2026 · Tüm hakları saklıdır · İstanbul</div>
  </footer>

  <a class="whatsapp-btn" href="https://wa.me/905459594845" target="_blank">💬</a>

  <script>
    function menuAc() { document.getElementById('mobilMenu').classList.toggle('acik'); }
    function menuKapat() { document.getElementById('mobilMenu').classList.remove('acik'); }

    var kelime = '';

    function ara(k) {
      kelime = k.toLowerCase().trim();
      document.getElementById('aramaBaslik').innerHTML = '"<span>' + k + '</span>" için sonuçlar';
      document.getElementById('yeniArama').value = k;

      // Sheets'e kaydet
      var img = new Image();
      img.src = "https://script.google.com/macros/s/AKfycbwxLk2mG7mIRbSOxrA62yukb5gmHuihFWTPRN7BSZ6d6F_aYuUX53ScKErtdgK5N8pLKQ/exec?mesaj=" + encodeURIComponent("ARAMA: " + k);

      // Tüm verileri çek
      Promise.all([
        fetch('makaleler.json?t=' + Date.now()).then(r => r.json()).catch(() => []),
        fetch('haberler.json?t=' + Date.now()).then(r => r.json()).catch(() => []),
        fetch('dilekce.json?t=' + Date.now()).then(r => r.json()).catch(() => [])
      ]).then(function(sonuclar) {
        var makaleler = sonuclar[0];
        var haberler = sonuclar[1];
        var dilekce = sonuclar[2];

        var mFiltre = makaleler.filter(m => ara_filtre(m, kelime));
        var hFiltre = haberler.filter(h => ara_filtre(h, kelime));
        var dFiltre = dilekce.filter(d => ara_filtre_dilekce(d, kelime));

        var toplam = mFiltre.length + hFiltre.length + dFiltre.length;
        var alan = document.getElementById('sonuclarAlani');

        if (toplam === 0) {
          alan.innerHTML = '<div class="bos-sonuc">Aramanızla eşleşen sonuç bulunamadı.<br><br><a href="index.html" style="font-size:0.8rem;color:var(--bordo);border-bottom:1px solid var(--bordo);">Ana sayfaya dön</a></div>';
          return;
        }

        var html = '';

        if (mFiltre.length) {
          html += '<div class="sonuc-grup">';
          html += '<div class="sonuc-grup-baslik">Makaleler <span class="sonuc-sayi">' + mFiltre.length + '</span></div>';
          html += mFiltre.map(m => '<a href="makale.html?id=' + m.id + '" class="sonuc-kart"><div class="sonuc-tip">Makale</div><div><div class="sonuc-baslik">' + m.baslik + '</div><p class="sonuc-ozet">' + m.ozet + '</p><span class="sonuc-kategori">' + m.kategori + '</span></div></a>').join('');
          html += '</div>';
        }

        if (hFiltre.length) {
          html += '<div class="sonuc-grup">';
          html += '<div class="sonuc-grup-baslik">Haberler <span class="sonuc-sayi">' + hFiltre.length + '</span></div>';
          html += hFiltre.map(h => '<a href="haberler.html" class="sonuc-kart"><div class="sonuc-tip">Haber</div><div><div class="sonuc-baslik">' + h.baslik + '</div><p class="sonuc-ozet">' + h.ozet + '</p><span class="sonuc-kategori">' + h.kategori + '</span></div></a>').join('');
          html += '</div>';
        }

        if (dFiltre.length) {
          html += '<div class="sonuc-grup">';
          html += '<div class="sonuc-grup-baslik">Dilekçeler <span class="sonuc-sayi">' + dFiltre.length + '</span></div>';
          html += dFiltre.map(d => '<a href="dilekce.html" class="sonuc-kart"><div class="sonuc-tip">Dilekçe</div><div><div class="sonuc-baslik">' + d.baslik + '</div><p class="sonuc-ozet">' + d.aciklama + '</p><span class="sonuc-kategori">' + d.kategori + '</span></div></a>').join('');
          html += '</div>';
        }

        alan.innerHTML = html;
      });
    }

    function ara_filtre(item, k) {
      return (item.baslik || '').toLowerCase().includes(k) ||
             (item.ozet || '').toLowerCase().includes(k) ||
             (item.kategori || '').toLowerCase().includes(k) ||
             (item.icerik || '').toLowerCase().includes(k);
    }

    function ara_filtre_dilekce(item, k) {
      return (item.baslik || '').toLowerCase().includes(k) ||
             (item.aciklama || '').toLowerCase().includes(k) ||
             (item.kategori || '').toLowerCase().includes(k) ||
             (item.icerik || '').toLowerCase().includes(k);
    }

    function yeniAramaYap() {
      var k = document.getElementById('yeniArama').value.trim();
      if (!k) return;
      window.location.href = 'arama-sonuclari.html?ara=' + encodeURIComponent(k);
    }
    document.getElementById('yeniArama').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') yeniAramaYap();
    });

    // URL'den kelimeyi al
    var params = new URLSearchParams(window.location.search);
    var araParam = params.get('ara');
    if (araParam) {
      ara(araParam);
    } else {
      document.getElementById('sonuclarAlani').innerHTML = '<div class="bos-sonuc">Arama yapmak için ana sayfayı kullanın.</div>';
    }
  </script>
</body>
</html>
